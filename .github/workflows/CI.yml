name: CI

on:
  push:
    tags:
      - "**"
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        include:
          - os: macos-latest
            target: universal2-apple-darwin
    name: Build on ${{ matrix.os}} ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        id: python
        with:
          python-version: ${{ matrix.python-version-full || matrix.python-version }}
          allow-prereleases: true
          cache: "pip"

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: cache-uv
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python-${{ matrix.python-version }}-uv

      - name: Install rust stable
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools

      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          manylinux: auto
          target: ${{ matrix.target }}
          rust-toolchain: stable
          sccache: "true"
          args: >
            --release
            --sdist
            --interpreter ${{ matrix.python-version }}
            --out pgo-wheel
        env:
          RUSTFLAGS: "-Cprofile-generate=${{ github.workspace }}/target/profdata"

      - name: Get rust host
        run: echo RUST_HOST=$(rustc -Vv | grep host | cut -d ' ' -f 2) >> "$GITHUB_ENV"
        shell: bash

      - name: Generate pgo data
        run: |
          pip install -U uv
          uv pip install -r requirements/bench.txt --python ${{ steps.python.outputs.python-path }}
          uv pip install serpyco_rs --no-index --no-deps --find-links pgo-wheel --force-reinstall --python ${{ steps.python.outputs.python-path }}
          # Install package deps
          uv pip install serpyco_rs --find-links pgo-wheel --python ${{ steps.python.outputs.python-path }}
          pytest bench -k "not mashumaro and not marshmallow and not pydantic"
          rustup run stable bash -c 'echo LLVM_PROFDATA=$RUSTUP_HOME/toolchains/$RUSTUP_TOOLCHAIN/lib/rustlib/${{ env.RUST_HOST }}/bin/llvm-profdata >> "$GITHUB_ENV"'

      #      - name: Setup upterm session
      #        uses: lhotari/action-upterm@v1

      - name: Merge pgo data
        run: ${{ env.LLVM_PROFDATA }} merge -o ${{ github.workspace }}/merged.profdata ${{ github.workspace }}/target/profdata

      - name: Build pgo-optimized wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          manylinux: auto
          rust-toolchain: stable
          command: build
          target: ${{ matrix.target }}
          sccache: "true"
          args: >
            --release
            --sdist
            --interpreter ${{ matrix.python-version }}
            --out dist
        env:
          RUSTFLAGS: "-Cprofile-use=${{ github.workspace }}/merged.profdata"

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels_${{ matrix.os }}_${{ matrix.python-version }}
          path: dist

  linux-cross:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            # and https://github.com/gnzlbg/jemallocator/issues/170#issuecomment-1503228963
            maturin_docker_options: -e JEMALLOC_SYS_WITH_LG_PAGE=16
          - target: armv7-unknown-linux-gnueabihf
            arch: armv7
          - target: s390x-unknown-linux-gnu
            arch: s390x
          - target: powerpc64le-unknown-linux-gnu
            arch: ppc64le
          - target: powerpc64-unknown-linux-gnu
            arch: ppc64

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: "Build wheels"
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: auto
          docker-options: ${{ matrix.platform.maturin_docker_options }}
          args: --release --sdist -o dist --interpreter 3.10 3.11 3.12 3.13 3.14
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels_${{ matrix.platform.arch }}
          path: dist

  test:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    name: Test on ${{ matrix.os}} ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheels_*
          merge-multiple: true
          path: wheels
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip nox uv
      - name: tests
        run: nox -s test
        env:
          CI: true
      - name: lint
        run: nox -s lint
        env:
          CI: true
      - name: check types
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: nox -s type_check
        env:
          CI: true

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    # Skip on forked PRs — CODECOV_TOKEN is not exposed there.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Install rust stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2
        with:
          tool: cargo-llvm-cov
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip nox uv
      - name: coverage
        run: nox -s coverage
      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  benchmark:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    name: Benchmark on ${{ matrix.os}}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.13
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheels_*
          merge-multiple: true
          path: wheels
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip nox uv
          nox -s bench --no-venv --install-only
      - name: bench
        run: nox -s bench --no-venv --no-install
        env:
          CI: true

  test_rc_leaks:
    name: Test reference count leaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: deadsnakes/action@6c8b9b82fe0b4344f4b98f2775fcc395df45e494 # v3.1.0
        with:
          python-version: 3.13
          debug: true
      - run: python3.13 --version --version && which python3.13 && python3.13 -c "import sys; print(sys.gettotalrefcount())"
      - uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: build
          args: --release --sdist -o wheels
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip nox uv
          nox -s test_rc_leaks --no-venv --install-only
      - name: tests
        run: nox -s test_rc_leaks --no-venv --no-install

  benchmark-codespeed:
    needs: [build]
    # Skip on forked PRs — CODSPEED_TOKEN is not exposed there.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        mode: [instrumentation, walltime]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        id: cache-uv
        with:
          path: ~/.cache/uv
          key: ubuntu-latest-python-3.13-uv-${{ matrix.mode }}
      - name: set up Python 3.13
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: 3.13
          cache: "pip"
          cache-dependency-path: |
            requirements/*.txt
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheels_*
          merge-multiple: true
          path: wheels
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip nox uv
          nox -s bench_codespeed --no-venv --install-only
      - name: Run benchmarks
        uses: CodSpeedHQ/action@76578c2a7ddd928664caa737f0e962e3085d4e7c # v3
        with:
          token: ${{ secrets.CODSPEED_TOKEN }}
          mode: ${{ matrix.mode }}
          run: nox -s bench_codespeed --no-venv --no-install
        env:
          CI: true

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2
        with:
          tool: cargo-audit
      - run: cargo audit

  release:
    name: release
    runs-on: ubuntu-latest
    if: startsWith(github.event.ref, 'refs/tags')
    needs: [build, linux-cross, test]
    permissions: {}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheels_*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --skip-existing dist/*
